<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNH de Primeira | Opção 2</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f5f8fb;
        --foreground: #17212f;
        --muted: #64748b;
        --card: #ffffff;
        --border: #d8e2ec;
        --primary: #16834a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--foreground);
        background:
          linear-gradient(rgba(22, 131, 74, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(22, 131, 74, 0.05) 1px, transparent 1px),
          var(--background);
        background-size: 32px 32px;
      }

      main {
        width: min(720px, 100%);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: clamp(24px, 5vw, 44px);
        background: var(--card);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      }

      .badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 7px 11px;
        background: rgba(22, 131, 74, 0.1);
        color: #0e6a3a;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(34px, 7vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 8px;
        padding: 0 18px;
        background: var(--primary);
        color: #ffffff;
        font-weight: 900;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Opção 2</span>
      <h1>Landing HTML · Método</h1>
      <p>
        Landing clara com simulador, dor do aluno, método anti-pegadinha, módulos, autoridade, prova social, oferta e FAQ. <br><br>
        <i>(Nota: Os arquivos originais desta landing estática não estão presentes no diretório no momento, este é apenas um placeholder).</i>
      </p>
      <a href="/">Voltar para o Hub</a>
    </main>
  </body>
</html>
